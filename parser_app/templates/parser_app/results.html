<!DOCTYPE html>
<html>
<head>
    <title>Parsing Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3>Processing Complete</h3>
            </div>
            <div class="card-body text-center">
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <h5>Summary</h5>
                        <ul class="list-group text-start">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Total Records
                                <span class="badge bg-primary rounded-pill">{{ stats.total }}</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Successfully Parsed
                                <span class="badge bg-success rounded-pill">{{ stats.success }}</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Failed
                                <span class="badge bg-danger rounded-pill">{{ stats.failed }}</span>
                            </li>
                        </ul>
                    </div>
                    <div class="col-md-6">
                        <h5>Model Usage</h5>
                        <ul class="list-group text-start">
                            <li class="list-group-item">DeepParse: {{ stats.deepparse }}</li>
                            <li class="list-group-item">UsAddress (Fallback): {{ stats.usaddress }}</li>
                        </ul>
                    </div>
                </div>

                <div class="mb-4">
                    <img src="data:image/png;base64,{{ plot_image }}" class="img-fluid border rounded" alt="Parsing Breakdown Chart">
                </div>

                <div class="d-grid gap-2">
                    <a href="{{ download_url }}" class="btn btn-primary btn-lg">Download Cleaned Excel File</a>
                    <a href="{% url 'upload' %}" class="btn btn-secondary">Process Another File</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
